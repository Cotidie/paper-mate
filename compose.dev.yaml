# Optional dev override for in-container backend hot-reload.
# Use:  docker compose -f docker-compose.yml -f compose.dev.yaml up
#
# The base image bakes server/app in at build time and runs uvicorn with no
# --reload, so a plain `docker compose up` serves the code as built (a backend
# edit needs `docker compose up --build`). This override bind-mounts the live
# server/app source over the baked copy and runs uvicorn with --reload, so
# backend edits reload without a rebuild. The `user:` mapping is inherited from
# docker-compose.yml.
#
# Frontend HMR is NOT covered here: the image serves the built static SPA. For
# live frontend dev use the host two-process flow (`cd client && npm run dev`),
# which is the canonical dev loop (see README "Development").
services:
  paper-mate:
    volumes:
      - "./server/app:/app/app"
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
